name: Verify Formatting

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  format-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - backend
          - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ matrix.project }}-${{ hashFiles(format('{0}/package-lock.json', matrix.project)) }}
          restore-keys: |
            npm-${{ runner.os }}-${{ matrix.project }}-

      - name: Install dependencies
        run: npm --prefix ${{ matrix.project }} ci

      - name: Run formatter check
        run: npm --prefix ${{ matrix.project }} run format:check

      # - name: Run lint check
      #   run: npm --prefix ${{ matrix.project }} run lint:check
