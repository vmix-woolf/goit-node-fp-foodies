name: Verify Frontend Build And Backend Syntax

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build frontend
        run: npm --prefix frontend run build

  backend-syntax-import-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Check backend JavaScript syntax
        run: |
          find backend \
            \( -path "backend/node_modules" -o -path "backend/.git" \) -prune \
            -o -type f -name "*.js" -print0 | xargs -0 -n 1 node --check

      - name: Check backend import resolution
        run: node -e "import('./backend/app.js')"
