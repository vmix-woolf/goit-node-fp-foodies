openapi: 3.0.3

info:
  title: Foodies API
  version: 1.0.0
  description: |
    REST API for the Foodies recipe-sharing platform.

    ## Authentication
    Protected endpoints require a JWT Bearer token obtained from `POST /api/auth/login`.
    Include it as: `Authorization: Bearer <token>`

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.foodies.example.com
    description: Production server

tags:
  - name: Authentication
    description: User registration and session management
  - name: Catalog
    description: Reference data — categories, ingredients, areas, and testimonials
  - name: Recipes
    description: Recipe browsing, creation, and management
  - name: Users
    description: User profiles and social features (followers / following)

# ─────────────────────────────────────────────────────────────
# Reusable components
# ─────────────────────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from POST /api/auth/login

  # ── Schemas ────────────────────────────────────────────────
  schemas:

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane@example.com
        avatar:
          type: string
          nullable: true
          example: https://gravatar.com/avatar/abc123

    UserProfile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            recipesCreated:
              type: integer
              example: 12
            favoritesCount:
              type: integer
              example: 5
            followersCount:
              type: integer
              example: 20
            followingCount:
              type: integer
              example: 8

    UserPublicProfile:
      type: object
      description: Public profile of another user — email is partially masked for privacy
      properties:
        id:
          type: integer
          example: 2
        name:
          type: string
          example: John Doe
        email:
          type: string
          description: Partially masked (e.g. j***@example.com)
          example: j***@example.com
        avatarURL:
          type: string
          nullable: true
          example: https://gravatar.com/avatar/xyz
        createdAt:
          type: string
          format: date-time
        recipesCreated:
          type: integer
          example: 4
        followersCount:
          type: integer
          example: 10

    PublicUser:
      type: object
      description: Minimal user info returned in follower / following lists
      properties:
        id:
          type: integer
          example: 3
        name:
          type: string
          example: Alice Smith
        email:
          type: string
          format: email
          example: alice@example.com
        avatar:
          type: string
          nullable: true
          example: https://gravatar.com/avatar/alice

    Category:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Breakfast
        image:
          type: string
          nullable: true
          example: https://example.com/images/breakfast.jpg

    Ingredient:
      type: object
      properties:
        id:
          type: integer
          example: 10
        name:
          type: string
          example: Tomato
        image:
          type: string
          nullable: true
          example: https://example.com/images/tomato.jpg

    Area:
      type: object
      properties:
        id:
          type: integer
          example: 3
        name:
          type: string
          example: Italian

    Testimonial:
      type: object
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          example: 5
        content:
          type: string
          example: Amazing recipes! I use this app every day.
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        isPublished:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        owner:
          type: object
          description: Testimonial author (subset of User)
          properties:
            id:
              type: integer
              example: 5
            email:
              type: string
              format: email
              example: user@example.com

    RecipeAuthor:
      type: object
      description: Compact author info embedded in recipe responses
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Jane Doe
        avatar:
          type: string
          nullable: true
          example: https://gravatar.com/avatar/abc123

    RecipeListItem:
      type: object
      description: |
        Recipe summary returned in list and search results.

        **Field note:** The recipes table uses `name` as the column name.
        The Sequelize model currently maps it as `title` — this is a known
        in-progress alignment issue and will be resolved separately.
      properties:
        id:
          type: integer
          example: 42
        name:
          type: string
          example: Spaghetti Carbonara
        description:
          type: string
          nullable: true
          example: Classic Italian pasta dish with eggs and bacon
        instructions:
          type: string
          nullable: true
          example: Cook pasta, mix with egg sauce...
        cookingTime:
          type: integer
          nullable: true
          example: 30
          description: Cooking time in minutes
        servings:
          type: integer
          nullable: true
          example: 4
        image:
          type: string
          nullable: true
          example: https://example.com/images/carbonara.jpg
        categoryId:
          type: integer
          nullable: true
          example: 3
        userId:
          type: integer
          nullable: true
          example: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        Category:
          $ref: '#/components/schemas/Category'
        author:
          $ref: '#/components/schemas/RecipeAuthor'

    RecipeIngredientLink:
      type: object
      description: Ingredient with its quantity in this specific recipe
      properties:
        id:
          type: integer
          example: 10
        name:
          type: string
          example: Tomato
        image:
          type: string
          nullable: true
          example: https://example.com/images/tomato.jpg
        RecipeIngredient:
          type: object
          description: Join-table data (quantity and optional unit)
          properties:
            quantity:
              type: string
              nullable: true
              example: 200g
            unit:
              type: string
              nullable: true
              example: grams

    RecipeDetail:
      allOf:
        - $ref: '#/components/schemas/RecipeListItem'
        - type: object
          description: Full recipe details including ingredient list and cuisine areas
          properties:
            Ingredients:
              type: array
              items:
                $ref: '#/components/schemas/RecipeIngredientLink'
            Areas:
              type: array
              items:
                $ref: '#/components/schemas/Area'

    CreateRecipeBody:
      type: object
      required:
        - name
        - instructions
        - cookingTime
        - servings
        - categoryId
        - ingredients
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 200
          example: Spaghetti Carbonara
        description:
          type: string
          maxLength: 500
          example: Classic Italian pasta dish
        instructions:
          type: string
          minLength: 10
          example: Boil pasta, fry bacon, mix with eggs and parmesan...
        image:
          type: string
          format: uri
          example: https://example.com/images/carbonara.jpg
        cookingTime:
          type: integer
          minimum: 1
          maximum: 600
          example: 30
        servings:
          type: integer
          minimum: 1
          maximum: 50
          example: 4
        categoryId:
          type: integer
          minimum: 1
          example: 3
        ingredients:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - ingredientId
              - quantity
            properties:
              ingredientId:
                type: integer
                minimum: 1
                example: 10
              quantity:
                type: string
                minLength: 1
                maxLength: 100
                example: 200g
        areas:
          type: array
          items:
            type: integer
            minimum: 1
          example: [3]

    PaginatedTestimonials:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Testimonial'
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10

    PaginatedRecipes:
      type: object
      properties:
        total:
          type: integer
          example: 100
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0
        recipes:
          type: array
          items:
            $ref: '#/components/schemas/RecipeListItem'

    PaginatedFollowers:
      type: object
      properties:
        followers:
          type: array
          items:
            $ref: '#/components/schemas/PublicUser'
        total:
          type: integer
          example: 20
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20

    PaginatedFollowing:
      type: object
      properties:
        following:
          type: array
          items:
            $ref: '#/components/schemas/PublicUser'
        total:
          type: integer
          example: 8
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20

    Error:
      type: object
      properties:
        message:
          type: string
          example: Resource not found

  # ── Common responses ────────────────────────────────────────
  responses:

    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: '"email" must be a valid email address'

    UnauthorizedError:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Not authorized

    ForbiddenError:
      description: Access denied — authenticated but not permitted to perform this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Not authorized

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Recipe not found

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Server error

# ─────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────
paths:

  # ── Authentication ─────────────────────────────────────────

  /api/auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: Jane Doe
                email:
                  type: string
                  format: email
                  example: jane@example.com
                password:
                  type: string
                  minLength: 6
                  example: secret123
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Email in use

  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: jane@example.com
                password:
                  type: string
                  example: secret123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT Bearer token — include as Authorization header for protected endpoints
                    example: eyJhbGciOiJIUzI1NiJ9...
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Email or password is wrong

  /api/auth/logout:
    post:
      tags: [Authentication]
      summary: Log out the current user
      description: |
        Clears the JWT token stored on the user record.

        **Note:** `bearerAuth` middleware is currently a development stub
        and does not yet validate tokens.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out successfully (no body)
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ── Catalog ────────────────────────────────────────────────

  /api/categories:
    get:
      tags: [Catalog]
      summary: List all recipe categories
      responses:
        '200':
          description: Array of all categories
          headers:
            Cache-Control:
              schema:
                type: string
              example: public, max-age=3600, stale-while-revalidate=86400
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/ingredients:
    get:
      tags: [Catalog]
      summary: List all ingredients
      responses:
        '200':
          description: Array of all ingredients
          headers:
            Cache-Control:
              schema:
                type: string
              example: public, max-age=3600, stale-while-revalidate=86400
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/areas:
    get:
      tags: [Catalog]
      summary: List all cuisine areas
      responses:
        '200':
          description: Array of all cuisine areas
          headers:
            Cache-Control:
              schema:
                type: string
              example: public, max-age=3600, stale-while-revalidate=86400
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Area'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/testimonials:
    get:
      tags: [Catalog]
      summary: List published testimonials (paginated)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-based)
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: Items per page (max 50)
      responses:
        '200':
          description: Paginated list of published testimonials
          headers:
            Cache-Control:
              schema:
                type: string
              example: public, max-age=3600, stale-while-revalidate=86400
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTestimonials'
        '500':
          $ref: '#/components/responses/ServerError'

  # ── Recipes ────────────────────────────────────────────────

  /api/recipes:
    get:
      tags: [Recipes]
      summary: Search and filter recipes
      description: Returns recipes matching the given filters, ordered by creation date (newest first).
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Case-insensitive substring search on recipe name
        - in: query
          name: categoryId
          schema:
            type: integer
            minimum: 1
          description: Filter by category ID
        - in: query
          name: ingredientId
          schema:
            type: integer
            minimum: 1
          description: Filter to recipes that contain this ingredient
        - in: query
          name: areaId
          schema:
            type: integer
            minimum: 1
          description: Filter by cuisine area ID
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of results to return
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of results to skip
      responses:
        '200':
          description: Paginated recipe results
          headers:
            Cache-Control:
              schema:
                type: string
              example: public, max-age=300, stale-while-revalidate=600
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRecipes'
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      tags: [Recipes]
      summary: Create a new recipe
      description: |
        Creates a recipe owned by the authenticated user.
        Ingredients and optional cuisine areas are linked in a single transaction.

        **Note:** Authentication middleware is currently a development stub;
        owner is temporarily hardcoded to user id 1.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecipeBody'
      responses:
        '201':
          description: Recipe created successfully — returns full detail with linked ingredients and areas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/recipes/popular:
    get:
      tags: [Recipes]
      summary: List most-favorited recipes
      description: Returns recipes ordered by the number of times they have been added to favorites.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of results to return
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of results to skip
      responses:
        '200':
          description: Array of popular recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecipeListItem'
        '404':
          description: No favorited recipes found yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: No popular result found
        '500':
          $ref: '#/components/responses/ServerError'

  /api/recipes/own:
    get:
      tags: [Recipes]
      summary: List the current user's own recipes
      description: |
        Returns recipes created by the authenticated user, ordered by creation date (newest first).

        **Note:** Authentication middleware is currently a development stub;
        results are temporarily scoped to user id 1.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of results to return
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of results to skip
      responses:
        '200':
          description: Paginated list of the user's recipes
          headers:
            Cache-Control:
              schema:
                type: string
              example: private, no-store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRecipes'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/recipes/{id}:
    get:
      tags: [Recipes]
      summary: Get a recipe by ID
      description: Returns full recipe details including linked ingredients (with quantities) and cuisine areas.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: Recipe ID (positive integer)
      responses:
        '200':
          description: Full recipe detail
          headers:
            Cache-Control:
              schema:
                type: string
              example: public, max-age=600, stale-while-revalidate=1800
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetail'
        '400':
          description: Invalid recipe ID (not a positive integer)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Invalid recipe id
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/ServerError'

    delete:
      tags: [Recipes]
      summary: Delete a recipe
      description: |
        Deletes a recipe owned by the authenticated user.
        Returns `403` if the authenticated user is not the recipe owner.

        **Note:** Authentication middleware is currently a development stub;
        ownership is checked against user id 1.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: Recipe ID (positive integer)
      responses:
        '200':
          description: Recipe deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Recipe deleted successfully
        '400':
          description: Invalid recipe ID (not a positive integer)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Invalid recipe id
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/ServerError'

  # ── Users ──────────────────────────────────────────────────

  /api/users/me:
    get:
      tags: [Users]
      summary: Get the current user's profile
      description: |
        Returns the authenticated user's profile with social and content metrics.

        **Note:** `bearerAuth` middleware is currently a development stub.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user's full profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/users/me/followers:
    get:
      tags: [Users]
      summary: List users who follow the current user
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-based)
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
      responses:
        '200':
          description: Paginated list of followers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFollowers'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/users/me/following:
    get:
      tags: [Users]
      summary: List users the current user follows
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-based)
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
      responses:
        '200':
          description: Paginated list of followed users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFollowing'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/users/{id}:
    get:
      tags: [Users]
      summary: Get another user's public profile
      description: Returns the public profile of an arbitrary user. Email is partially masked for privacy.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: Target user ID
      responses:
        '200':
          description: User's public profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublicProfile'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/ServerError'
